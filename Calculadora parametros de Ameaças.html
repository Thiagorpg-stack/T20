<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela Parâmetros de Ameaças T20 - Completa</title>
    <style>
        :root {
            --parchment: #f4e4bc;
            --border-color: #8b4513;
            --t20-red: #8b0000;
            --text-dark: #2c1a0a;
        }

        body {
            font-family: 'EB Garamond', serif;
            background-color: #2c1a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: var(--text-dark);
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--parchment);
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            padding: 30px;
            border: 10px double var(--border-color);
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            position: relative;
            background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            color: var(--t20-red);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 0;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            background: rgba(0,0,0,0.05);
            padding: 20px;
            border-radius: 8px;
            flex-wrap: wrap;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        label {
            font-weight: bold;
            font-size: 1em;
            color: var(--t20-red);
            text-transform: uppercase;
        }

        select {
            padding: 10px 15px;
            font-size: 1.1em;
            border: 2px solid var(--border-color);
            background: white;
            cursor: pointer;
            border-radius: 4px;
            font-family: inherit;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(139, 69, 19, 0.3);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .card-header {
            background-color: var(--t20-red);
            color: white;
            text-align: center;
            padding: 10px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.9em;
        }

        .card-body {
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            flex-grow: 1;
        }

        .stat-item {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .stat-icon {
            font-size: 2.5em;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: var(--t20-red);
        }

        .stat-label {
            font-size: 0.9em;
            font-weight: bold;
            opacity: 0.8;
            line-height: 1.2;
        }

        .full-width {
            grid-column: span 2;
        }

        .footer-note {
            margin-top: 30px;
            background-color: #111;
            color: #eee;
            padding: 15px;
            border-radius: 5px;
            font-size: 0.95em;
            line-height: 1.5;
            border-left: 5px solid var(--t20-red);
            min-height: 80px;
        }

        .footer-note b {
            color: #ffaa00;
            text-transform: uppercase;
        }

        @media (max-width: 700px) {
            .grid { grid-template-columns: 1fr; }
            .controls { flex-direction: column; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;700&display=swap" rel="stylesheet">
</head>

    <div class="controls">
        <div class="control-group">
            <label>Tipo de Ameaça</label>
            <select id="type-select" onchange="updateStats()">
                <option value="solo">Solo</option>
                <option value="lacaio">Lacaio</option>
                <option value="especial">Especial</option>
            </select>
        </div>
        <div class="control-group">
            <label>Nível de Desafio (ND)</label>
            <select id="nd-select" onchange="updateStats()">
                </select>
        </div>
    </div>

    <div class="grid">
        <div class="card">
            <div class="card-header">Atributos de Combate</div>
            <div class="card-body">
                <div class="stat-item">
                    <span class="stat-icon">❤️</span>
                    <span class="stat-value" id="val-pv">-</span>
                    <span class="stat-label">Pontos de Vida</span>
                </div>
                <div class="stat-item">
                    <span class="stat-icon">⚔️</span>
                    <span class="stat-value" id="val-ataque">-</span>
                    <span class="stat-label">Valor de Ataque</span>
                </div>
                <div class="stat-item">
                    <span class="stat-icon">🛡️</span>
                    <span class="stat-value" id="val-defesa">-</span>
                    <span class="stat-label">Defesa</span>
                </div>
                <div class="stat-item">
                    <span class="stat-icon">💥</span>
                    <span class="stat-value" id="val-dano">-</span>
                    <span class="stat-label">Dano Médio</span>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">Resistências e Habilidades</div>
            <div class="card-body">
                <div class="stat-item">
                    <span class="stat-icon">💪</span>
                    <span class="stat-value" id="val-resforte">-</span>
                    <span class="stat-label">Res. Forte</span>
                </div>
                <div class="stat-item">
                    <span class="stat-icon">↕️</span>
                    <span class="stat-value" id="val-resmedia">-</span>
                    <span class="stat-label">Res. Média</span>
                </div>
                <div class="stat-item">
                    <span class="stat-icon">🤏</span>
                    <span class="stat-value" id="val-resfraca">-</span>
                    <span class="stat-label">Res. Fraca</span>
                </div>
                <div class="stat-item">
                    <span class="stat-icon">📜</span>
                    <span class="stat-value" id="val-cd">-</span>
                    <span class="stat-label">CD Efeito</span>
                </div>
                <div class="stat-item full-width" style="margin-top: 5px; border-top: 1px dashed #ccc; padding-top: 10px;">
                    <span class="stat-icon">🪄</span>
                    <span class="stat-value" id="val-hab">-</span>
                    <span class="stat-label">Habilidades Sugeridas</span>
                </div>
            </div>
        </div>
    </div>

    <div class="footer-note" id="footer-text">
        Selecione o tipo e o ND para ver as dicas de design.
    </div>
</div>
